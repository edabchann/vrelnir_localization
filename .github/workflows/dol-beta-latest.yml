name: DOL Chinese Compile Beta Latest

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run build
        env:
          PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
        run: uv run python main.py -D beta

      - name: Clone output repository
        uses: GuillaumeFalourd/clone-github-repo-action@v2
        with:
          owner: ${{ secrets.GIT_OWNER }}
          repository: ${{ secrets.GIT_REPO }}
          access-token: ${{ secrets.ACCESS_TOKEN }}

      - name: Copy output
        run: |
          cp degrees-of-lewdity-master/Degrees\ of\ Lewdity*.html dol-chinese/beta.html
          cp degrees-of-lewdity-master/style.css dol-chinese/ 2>/dev/null || true
          cp -r degrees-of-lewdity-master/img dol-chinese/ 2>/dev/null || true

      - name: Commit and push
        run: |
          cd dol-chinese
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git config user.name "${{ secrets.GIT_USERNAME }}"
          git add .
          git diff --staged --quiet || git commit -m "测试版更新 $(date +%Y-%m-%d)"
          git push
