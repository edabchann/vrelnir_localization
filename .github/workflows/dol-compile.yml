name: DOL Chinese Compile

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run build
        env:
          PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
        run: uv run python main.py -D

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-${{ github.run_number }}
          name: "稳定版 #${{ github.run_number }} (${{ github.ref_name }})"
          files: degrees-of-lewdity-master/Degrees of Lewdity*.html
          prerelease: false
