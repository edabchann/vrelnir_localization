name: DOL Chinese Compile

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run build
        env:
          PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
        run: uv run python main.py -D

      - name: Check deploy config
        id: check
        env:
          S_OWNER: ${{ secrets.GIT_OWNER }}
          V_OWNER: ${{ vars.GIT_OWNER }}
          S_REPO: ${{ secrets.GIT_REPO }}
          V_REPO: ${{ vars.GIT_REPO }}
          S_EMAIL: ${{ secrets.GIT_EMAIL }}
          V_EMAIL: ${{ vars.GIT_EMAIL }}
          S_USER: ${{ secrets.GIT_USERNAME }}
          V_USER: ${{ vars.GIT_USERNAME }}
          TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          OWNER="${S_OWNER:-${V_OWNER:-}}"
          REPO="${S_REPO:-${V_REPO:-}}"
          EMAIL="${S_EMAIL:-${V_EMAIL:-}}"
          USERNAME="${S_USER:-${V_USER:-}}"
          echo "owner=[$OWNER] repo=[$REPO] token=[${TOKEN:+***}]"
          if [ -n "$OWNER" ] && [ -n "$REPO" ] && [ -n "$TOKEN" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
            echo "repo=$REPO" >> "$GITHUB_OUTPUT"
            echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
            echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::warning::部署配置不完整，跳过发布 (需配置 GIT_OWNER/GIT_REPO/ACCESS_TOKEN)"
          fi

      - name: Clone output repository
        if: steps.check.outputs.deploy == 'true'
        run: |
          git clone \
            "https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/${{ steps.check.outputs.owner }}/${{ steps.check.outputs.repo }}.git" \
            dol-chinese

      - name: Copy output
        if: steps.check.outputs.deploy == 'true'
        run: |
          cp degrees-of-lewdity-master/Degrees\ of\ Lewdity*.html dol-chinese/index.html
          cp degrees-of-lewdity-master/style.css dol-chinese/ 2>/dev/null || true
          cp -r degrees-of-lewdity-master/img dol-chinese/ 2>/dev/null || true

      - name: Commit and push
        if: steps.check.outputs.deploy == 'true'
        run: |
          cd dol-chinese
          git config user.email "${{ steps.check.outputs.email }}"
          git config user.name "${{ steps.check.outputs.username }}"
          git add .
          git diff --staged --quiet || git commit -m "稳定版更新 $(date +%Y-%m-%d)"
          git push
